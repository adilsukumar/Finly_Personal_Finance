<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Neon purple glow layer -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#7c3aed" stroke-width="1.5" opacity="0.6"/>
  <!-- Bold F letter -->
  <g filter="url(#glow)">
    <!-- Vertical bar of F -->
    <rect x="16" y="12" width="9" height="40" rx="2" fill="#a855f7"/>
    <!-- Top horizontal bar -->
    <rect x="16" y="12" width="30" height="9" rx="2" fill="#a855f7"/>
    <!-- Middle horizontal bar -->
    <rect x="16" y="27.5" width="23" height="8" rx="2" fill="#a855f7"/>
    <!-- Cyan accent dot -->
    <circle cx="48" cy="50" r="5" fill="#06b6d4" opacity="0.95"/>
  </g>
</svg>
